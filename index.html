<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>能量站</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        body { margin: 0; background: #f2f2f7; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; overflow: hidden; }
        
        /* 容器外层，控制整体位置 */
        #container { width: 85%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }

        #box { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            
            /* 设定高度：占屏幕 60%，超出则滚动 */
            height: 60vh; 
            overflow-y: auto; 
            /* iOS 顺滑滚动 */
            -webkit-overflow-scrolling: touch; 

            /* 内部文字样式 */
            font-size: 1.15rem; 
            line-height: 1.7; 
            color: #333; 
            white-space: pre-wrap; 
            word-break: break-word;
            transition: opacity 0.2s ease;
            box-sizing: border-box;
        }

        /* 隐藏滚动条，但保持滚动功能，让界面更干净 */
        #box::-webkit-scrollbar { width: 0; background: transparent; }

        button { 
            margin-top: 30px; 
            border: none; 
            background: #007aff; 
            color: white; 
            padding: 15px 45px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            -webkit-tap-highlight-color: transparent; 
        }
        button:active { transform: scale(0.92); opacity: 0.8; }
        #debug-info { position: fixed; bottom: 10px; font-size: 9px; color: #ccc; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="container">
        <div id="box">正在连接能量站...</div>
        <button onclick="draw()">刷一个</button>
    </div>

    <div id="debug-info">SYSTEM v3.5 | SCROLLABLE</div>

    <script>
        let data = [];
        const box = document.getElementById('box');

        // 彻底注销可能存在的旧 Service Worker 缓存
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(rs => {
                for(let r of rs) r.unregister();
            });
        }

        async function init() {
            try {
                const path = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
                const jsonUrl = `${path}data.json?nocache=${Date.now()}`;
                
                const response = await fetch(jsonUrl, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const json = await response.json();
                if (Array.isArray(json)) {
                    data = json;
                    if (data.length > 0) draw();
                    else box.innerText = "quotes 文件夹内没有找到有效的 .md 文件。";
                }
            } catch (err) {
                box.innerHTML = `<span style="color:#ff3b30;font-weight:bold">加载失败</span><br><small style="color:#888">${err.message}</small>`;
            }
        }

        function draw() {
            if (data.length === 0) return;
            box.style.opacity = 0;
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * data.length);
                
                // 写入文字
                box.innerText = data[randomIndex];
                
                // 关键：切换文章时，滚动条自动回到顶部
                box.scrollTop = 0;
                
                box.style.opacity = 1;
            }, 200);
        }

        init();
    </script>
</body>
</html>
