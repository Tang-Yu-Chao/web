<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>能量站</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        body { margin: 0; background: #f2f2f7; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; overflow: hidden; }
        #box { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            min-height: 200px; 
            display: flex; 
            align-items: center; 
            font-size: 1.15rem; 
            line-height: 1.7; 
            color: #333; 
            white-space: pre-wrap; /* 关键：保留换行 */
            word-break: break-word;
            transition: opacity 0.2s ease;
        }
        button { 
            margin-top: 40px; 
            border: none; 
            background: #007aff; 
            color: white; 
            padding: 15px 45px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            -webkit-tap-highlight-color: transparent; 
        }
        button:active { transform: scale(0.92); opacity: 0.8; }
        #debug-info { position: fixed; bottom: 10px; font-size: 9px; color: #ccc; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="box">正在连接能量站...</div>
    <button onclick="draw()">刷一个</button>
    <div id="debug-info">SYSTEM v3.0 | NO-CACHE MODE</div>

    <script>
        let data = [];
        const box = document.getElementById('box');

        // 彻底清理旧 Service Worker 的“核武器”
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister();
                    console.log('已强制注销旧 SW');
                }
            });
        }

        async function init() {
            try {
                // 自动识别 GitHub Pages 目录层级
                const path = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
                const jsonUrl = `${path}data.json?nocache=${Date.now()}`;
                
                const response = await fetch(jsonUrl, { 
                    cache: "no-store",
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const json = await response.json();
                if (!Array.isArray(json)) throw new Error('数据非数组格式');

                data = json;
                if (data.length === 0) {
                    box.innerText = "数据池为空，请检查 quotes 文件夹。";
                } else {
                    draw();
                }
            } catch (err) {
                box.innerHTML = `<span style="color:#ff3b30;font-weight:bold">通信中断</span><br><small style="color:#888">${err.message}</small>`;
                console.error(err);
            }
        }

        function draw() {
            if (data.length === 0) return;
            box.style.opacity = 0;
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * data.length);
                // 使用 innerText 配合 CSS pre-wrap 解决奇怪的排版问题
                box.innerText = data[randomIndex];
                box.style.opacity = 1;
            }, 200);
        }

        init();
    </script>
</body>
</html>
