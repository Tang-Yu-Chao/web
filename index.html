<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>能量站</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #f2f2f7; font-family: -apple-system; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        #box { background: white; padding: 30px; border-radius: 20px; width: 80%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 200px; display: flex; align-items: center; font-size: 1.2rem; line-height: 1.6; color: #333; }
        button { margin-top: 40px; border: none; background: #007aff; color: white; padding: 15px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="box">加载中...</div>
    <button onclick="draw()">刷一个</button>
    <script>
        let data = [];
        fetch('data.json').then(r => r.json()).then(d => { data = d; draw(); });
        function draw() {
            if(data.length) document.getElementById('box').innerText = data[Math.floor(Math.random()*data.length)];
        }
        if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
