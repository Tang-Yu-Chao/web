<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>能量站</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; background: #f2f2f7; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        #box { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            min-height: 200px; 
            display: flex; 
            align-items: center; 
            font-size: 1.2rem; 
            line-height: 1.6; 
            color: #333; 
            white-space: pre-wrap; /* 保持 Markdown 的换行格式 */
            transition: opacity 0.3s ease;
        }
        button { 
            margin-top: 40px; 
            border: none; 
            background: #007aff; 
            color: white; 
            padding: 15px 40px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,122,255,0.3);
            -webkit-tap-highlight-color: transparent; 
        }
        button:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="box">加载中...</div>
    <button onclick="draw()">刷一个</button>

    <script>
        let data = [];
        const box = document.getElementById('box');

        // 核心修改：加上时间戳 ?v=... 强制绕过 GitHub Pages 和 Service Worker 缓存
        fetch('./data.json?v=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error('无法读取数据文件 (404)');
                return response.json();
            })
            .then(d => {
                data = d;
                if (data.length === 0) {
                    box.innerText = "数据池是空的，请检查 quotes 文件夹是否有 .md 文件。";
                } else {
                    draw();
                }
            })
            .catch(err => {
                box.innerText = "出错了: " + err.message + "\n请尝试刷新页面。";
                console.error(err);
            });

        function draw() {
            if (data.length) {
                box.style.opacity = 0; // 切换动画
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * data.length);
                    box.innerText = data[randomIndex];
                    box.style.opacity = 1;
                }, 200);
            }
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW 注册失败', err));
        }
    </script>
</body>
</html>
