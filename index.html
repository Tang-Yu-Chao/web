<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>能量站</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; background: #f2f2f7; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        #box { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            min-height: 200px; 
            display: flex; 
            align-items: center; 
            font-size: 1.2rem; 
            line-height: 1.6; 
            color: #333; 
            white-space: pre-wrap; 
            transition: opacity 0.3s ease;
        }
        button { 
            margin-top: 40px; 
            border: none; 
            background: #007aff; 
            color: white; 
            padding: 15px 40px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,122,255,0.3);
            -webkit-tap-highlight-color: transparent; 
        }
        button:active { transform: scale(0.95); opacity: 0.9; }
        #debug-info { position: fixed; bottom: 10px; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div id="box">初始化中...</div>
    <button onclick="draw()">刷一个</button>
    <div id="debug-info">Ver: 2.0</div>

    <script>
        let data = [];
        const box = document.getElementById('box');

        async function init() {
            try {
                // 构建一个绝对路径，并加上时间戳彻底粉碎缓存
                const baseUrl = window.location.href.split('?')[0].split('#')[0];
                const jsonUrl = (baseUrl.endsWith('/') ? baseUrl : baseUrl + '/') + 'data.json?t=' + Date.now();
                
                console.log('正在请求:', jsonUrl);
                
                const response = await fetch(jsonUrl, { cache: "no-store" });
                
                if (!response.ok) {
                    throw new Error(`网络请求失败 (状态码: ${response.status})`);
                }
                
                const d = await response.json();
                
                if (!Array.isArray(d)) {
                    throw new Error('数据格式不正确，应为数组');
                }

                data = d;
                
                if (data.length === 0) {
                    box.innerText = "数据池是空的，请检查 quotes 文件夹。";
                } else {
                    draw();
                }
            } catch (err) {
                box.innerHTML = `<span style="color:red">加载失败</span><br><small>${err.message}</small><br><button onclick="location.reload()" style="margin-top:10px;padding:5px 10px;font-size:12px">重试</button>`;
                console.error('详细错误信息:', err);
            }
        }

        function draw() {
            if (data.length) {
                box.style.opacity = 0;
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * data.length);
                    box.innerText = data[randomIndex];
                    box.style.opacity = 1;
                }, 200);
            }
        }

        // 启动加载
        init();

        /* 临时注释掉 Service Worker 注册代码，
           等 Safari 缓存彻底清理干净后再取消注释 
        */
        /*
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error', err));
        }
        */
    </script>
</body>
</html>
