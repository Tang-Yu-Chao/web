<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>能量站</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        /* 全局基础设置 */
        body { 
            margin: 0; 
            background: #f2f2f7; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden; /* 防止整个页面滚动 */
        }
        
        /* 1. 白色文字框容器 */
        #box { 
            background: white; 
            margin-top: 10vh; /* 距离顶部留一点距离 */
            padding: 30px; 
            border-radius: 25px; 
            width: 85%; 
            max-width: 450px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
            
            /* 高度计算：屏幕高度 - 顶部间距 - 底部按钮区域间距 */
            height: 60vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 

            font-size: 1.15rem; 
            line-height: 1.8; 
            color: #333; 
            white-space: pre-wrap; 
            word-break: break-word;
            transition: opacity 0.2s ease;
            box-sizing: border-box;
            position: relative;
        }

        /* 隐藏滚动条 */
        #box::-webkit-scrollbar { width: 0; background: transparent; }

        /* 2. 底部按钮固定区域 */
        .footer {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 20vh; /* 预留底部 20% 的高度给按钮 */
            display: flex; 
            justify-content: center; 
            align-items: center;
            pointer-events: none; /* 穿透点击，不干扰背景 */
        }

        button { 
            pointer-events: auto; /* 恢复按钮点击 */
            border: none; 
            background: #007aff; 
            color: white; 
            padding: 16px 50px; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 1.1rem;
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0,122,255,0.3);
            -webkit-tap-highlight-color: transparent; 
            transition: transform 0.1s;
        }
        
        button:active { transform: scale(0.92); opacity: 0.9; }

        #debug-info { 
            position: fixed; 
            bottom: 10px; 
            font-size: 9px; 
            color: #ccc; 
            letter-spacing: 1px; 
        }
    </style>
</head>
<body>

    <div id="box">初始化中...</div>

    <div class="footer">
        <button onclick="draw()">刷一个</button>
    </div>

    <div id="debug-info">SYSTEM v4.0 | FIXED BUTTON</div>

    <script>
        let data = [];
        const box = document.getElementById('box');

        // 强力清除旧缓存
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(rs => {
                for(let r of rs) r.unregister();
            });
        }

        async function init() {
            try {
                // 自动识别路径并添加随机参数防缓存
                const path = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
                const jsonUrl = `${path}data.json?t=${Date.now()}`;
                
                const response = await fetch(jsonUrl, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                data = await response.json();
                if (Array.isArray(data) && data.length > 0) {
                    draw();
                } else {
                    box.innerText = "数据池为空，请检查 quotes 文件夹。";
                }
            } catch (err) {
                box.innerHTML = `<span style="color:#ff3b30">连接失败</span><br><small>${err.message}</small>`;
            }
        }

        function draw() {
            if (data.length === 0) return;
            box.style.opacity = 0;
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * data.length);
                box.innerText = data[randomIndex];
                box.scrollTop = 0; // 切换后回到顶部
                box.style.opacity = 1;
            }, 200);
        }

        init();
    </script>
</body>
</html>
