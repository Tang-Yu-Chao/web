name: Deploy
on:
  push:
    branches: [ main ]
    paths: [ 'quotes/**', 'build.py' ]
permissions:
  contents: write
  pages: write
  id-token: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解决你看到的那个警告

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.x'

      - name: Run Build Script
        run: python build.py

      - name: Commit and Push data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 检查文件是否存在，防止报错
          if [ -f data.json ]; then
            git add data.json
            git commit -m "自动更新数据文件" || echo "内容无变化"
            git push
          else
            echo "错误：data.json 未生成，请检查 build.py"
            exit 1
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
